<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirraMan - Menú Principal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">

        <!-- ========== PANTALLA PRINCIPAL ========== -->
        <div id="main-menu" class="screen active">
            <div class="menu-buttons">
                <button id="btn-new-game"  onclick="startGame()">Partida Nueva</button>
                <button id="btn-continue"  onclick="continueGame()">Continuar Partida</button>
                <button id="btn-exit"      onclick="exitGame()">Salir del Juego</button>
            </div>
        </div>


    </div>

    <!-- Cerebro del juego -->
    <script src="script.js"></script>
</body>
</html>
