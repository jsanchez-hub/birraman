<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BirraMan - Nivel 1</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #3e2723;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            /* El canvas se escala para ocupar el espacio sin distorsionarse */
            max-width: 90vmin;
            max-height: 90vmin;
        }
    </style>
</head>
<body>
    <!-- El canvas es el "lienzo" donde se dibuja todo el juego -->
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script src="game.js"></script>
</body>
</html>
